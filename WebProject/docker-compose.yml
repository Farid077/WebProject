version: '3.9'

services:

  postgres:
    image: postgres:latest
    container_name: web_project_postgres
    restart: always
    environment:
      POSTGRES_USER: web_project_user
      POSTGRES_PASSWORD: web_project_password
      POSTGRES_DB: web_project_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql

  pgadmin:
    image: dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "8080:80"

  redis:
    image: redis:latest
    container_name: web_project_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  redisinsight:
    image: redis/redisinsight:latest
    ports:
      - "5540:5540"
    depends_on:
      - redis

volumes:
  postgres_data:
  redis_data: